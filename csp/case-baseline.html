<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Permissive: allows inline scripts (for comparison only). -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://websdk-stg.appsflyer.com https://websdk.appsflyer.com https://cdn.appsflyer.com https://wa.appsflyersdk.com; style-src 'self' 'unsafe-inline'; connect-src 'self' blob: https://websdk-stg.appsflyer.com https://websdk.appsflyer.com https://wa.appsflyer.com https://wa.onelink.me https://wa.appsflyersdk.com; img-src 'self' data: https://impressions.onelink.me https://impressions.onelnk.com; font-src 'self' data:; frame-src 'self' https://websdk-stg.appsflyer.com https://websdk.appsflyer.com https://cdn.appsflyer.com https://wa.appsflyersdk.com https://wa.appsflyer.com https://wa.onelink.me; base-uri 'self'; form-action 'self';"
    />
    <title>CSP: baseline permissive (AppsFlyer)</title>
    <link rel="stylesheet" href="../styles.css" />

    <script>
      (function () {
        "use strict";
        (function (t, e, n, s, a, c, i) {
          t.AppsFlyerSdkObject = a;
          t.AF =
            t.AF ||
            function () {
              (t.AF.q = t.AF.q || []).push(
                [Date.now()].concat(Array.prototype.slice.call(arguments))
              );
            };
          t.AF.id = t.AF.id || i;
          t.AF.plugins = {};
        })(window, document, "script", 0, "AF", "pba", {
          pba: {
            webAppId: "04fe1c0e-a88e-417c-908f-8cd8d53cdb3f",
            measurementStatus: true,
          },
        });
        window.AF_LOADER_CONFIG = {
          baseUrl: "https://websdk-stg.appsflyer.com",
          plugins: ["pba", "banners"],
          af_id: "04fe1c0e-a88e-417c-908f-8cd8d53cdb3f",
          webAppId: "04fe1c0e-a88e-417c-908f-8cd8d53cdb3f",
        };
      })();
    </script>
    <script
      src="https://websdk-stg.appsflyer.com/manifestLoader.v1.js"
      integrity="sha384-9j6illvSwuqtP7FpqftUl0x9vfuC07utFWFI9yivRVbUAQWAHl/UFoQetyTgd31p"
      crossorigin="anonymous"
    ></script>
    <script>
      if (typeof AF === "function") {
        AF("pba", "event", { eventType: "EVENT", eventName: "gabriel" });
      } else {
        console.error("[AppsFlyer] AF is not defined.");
      }
    </script>
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p><a href="../index-csp.html">← CSP suite</a></p>
        <h1>CSP: baseline (unsafe-inline)</h1>
        <p>
          Uses <code>script-src ... 'unsafe-inline'</code> so typical inline bootstrap works.
          Compare with stricter cases above.
        </p>
      </header>
      <section class="checklist-block" aria-labelledby="console-heading">
        <details class="block-details" open>
          <summary class="block-summary">
            <span class="chevron" aria-hidden="true"></span>
            <span class="brand-icon" aria-hidden="true" title="Log"></span>
            <span id="console-heading" class="block-label">Console</span>
            <span class="meta-pill" id="console-count">0</span>
          </summary>
          <div class="block-toolbar">
            <button id="clear-console" type="button" class="btn-ghost">Clear</button>
          </div>
          <ul id="console-log" class="item-list" role="list"></ul>
          <p class="sub-item-placeholder">Console output streams here.</p>
        </details>
      </section>
      <section class="checklist-block" aria-labelledby="network-heading">
        <details class="block-details" open>
          <summary class="block-summary">
            <span class="chevron" aria-hidden="true"></span>
            <span class="brand-icon" aria-hidden="true" title="Network"></span>
            <span id="network-heading" class="block-label">Network</span>
            <span class="meta-pill" id="network-count">0</span>
          </summary>
          <div class="block-toolbar">
            <button id="clear-network" type="button" class="btn-ghost">Clear</button>
          </div>
          <div class="network-wrap">
            <div class="network-head" role="row">
              <span>Name</span>
              <span>Status</span>
              <span>Type</span>
              <span>Initiator</span>
              <span>Size</span>
              <span>Time</span>
            </div>
            <div id="network-log" class="network-body" role="list"></div>
            <div class="network-empty" id="network-empty">No requests yet.</div>
          </div>
        </details>
      </section>
    </main>
    <script src="../node_modules/vconsole/dist/vconsole.min.js"></script>
    <script src="../script.js"></script>
  </body>
</html>
